<h1 id="tableLabel">Companies</h1>

<p>This component demonstrates fetching data from the server database.</p>

<p *ngIf="!companies"><em>Loading...</em></p>

<table class='table table-striped table-responsive' aria-labelledby="tableLabel" *ngIf="companies">
  <thead>
    <tr>
      <th>Company name</th>
      <th>Company address</th>
      <th>Details</th>
      <th>Update</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let company of companies">
      <td>{{company.name}}</td>
      <td>{{company.fullAddress}}</td>
      <td><button type="button" id="details" class="btn btn-light">Details</button></td>
      <td><button type="button" id="update" class="btn btn-success">Update</button></td>
      <td><button type="button" id="delete" class="btn btn-danger">Delete</button></td>
    </tr>
  </tbody>
</table>
