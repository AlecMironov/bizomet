<div *ngIf="!registrationCompleted">
    <p-blockUI [blocked]="disablePage">
        <p-progressSpinner></p-progressSpinner>
    </p-blockUI>

    <div class="surface-ground px-4 py-8 md:px-6 lg:px-8">
        <div class="flex flex-wrap shadow-2">
            <div class="hidden md:block w-full lg:w-7 px-0 py-4 lg:p-7 bg-blue-50">
                <img src="assets/images/bizomet_logo.png" alt="Logo" height="75" class="mb-6">
                <p-carousel [value]="features">
                    <ng-template let-feature pTemplate="item">
                        <div class="text-center mb-8">
                            <img src="assets/images/blocks/illustration/{{feature.image}}" alt="Image" class="mb-6 w-6">
                            <div class="mx-auto font-medium text-xl mb-4 text-blue-900">{{feature.title}}</div>
                            <p class="m-0 text-blue-700 line-height-3">{{feature.text}}</p>
                        </div>
                    </ng-template>
                </p-carousel>
            </div>
            <div class="w-full lg:w-5 p-4 lg:p-7 surface-card">
                <div class="flex flex-wrap align-items-center justify-content-center mb-5">
                    <span class="text-2xl font-medium text-900 w-full">Register Account</span>
                    <span class="font-normal w-full mt-2">Get your free Bizomet account now.</span>
                </div>

                <p-messages [(value)]="errorMessage" [enableService]="false" [escape]="false" [closable]="false"></p-messages>

                <form [formGroup]="registerForm" autocomplete="off" novalidate
                    (ngSubmit)="registerUser(registerForm.value)" class="flex flex-wrap">
                    <div class="w-full lg:w-6 lg:pr-1">
                        <label for="firstname" class="block text-900 font-medium mb-2">First Name</label>
                        <input id="firstname" formControlName="firstname" type="text" pInputText class="w-full mb-3 p-3"
                            autocomplete="on" pInputText placeholder="First Name">
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('firstname') && hasError('firstname', 'required')">
                            First Name is required</small>
                    </div>
                    <div class="w-full lg:w-6 lg:pl-1">
                        <label for="lastname" class="block text-900 font-medium mb-2">Last Name</label>
                        <input id="lastname" formControlName="lastname" type="text" pInputText class="w-full mb-3 p-3"
                            autocomplete="on" pInputText placeholder="Last Name">
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('lastname') && hasError('lastname', 'required')">
                            Last Name is required</small>
                    </div>

                    <div class="w-full">
                        <label for="email" class="block text-900 font-medium mb-2">Email address</label>
                        <input id="email" formControlName="email" type="text" pInputText class="w-full mb-3 p-3"
                            autocomplete="on" pInputText placeholder="Email address">
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('email') && hasError('email', 'required')">
                            Email is required</small>
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('email') && hasError('email', 'email')">
                            Please provide a valid email</small>
                    </div>

                    <div class="w-full lg:w-6 lg:pr-1">
                        <label for="password" class="block text-900 font-medium mb-2">Password</label>
                        <input p-password type="password" id="password" formControlName="password"
                            class="w-full mb-3 p-3" autocomplete="off" pInputText placeholder="Password">
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('password') && hasError('password', 'required')">
                            Password is required
                        </small>
                    </div>

                    <div class="w-full lg:w-6 lg:pl-1">
                        <label for="confirm" class="block text-900 font-medium mb-2">Confirm Password</label>
                        <input p-password type="password" id="confirm" formControlName="confirm" class="w-full mb-3 p-3"
                            autocomplete="off" pInputText placeholder="Confirm Password">
                        <small class="p-error block mb-3"
                            *ngIf="validateControl('confirm') && hasError('confirm', 'required')">
                            Confirmation is required
                        </small>
                        <small class="p-error block mb-3" *ngIf="hasError('confirm', 'mustMatch')">Passwords must
                            match</small>
                    </div>

                    <button pButton pRipple label="Register" type="submit" [disabled]="!registerForm.valid"
                        class="w-full py-3 font-medium mt-4"></button>

                    <div class="flex w-full align-items-center justify-content-center mt-6">
                        <span tabindex="0" class="font-medium">Already have an account?
                            <a class="ml-2 font-medium no-underline text-blue-500 hover:text-blue-700 cursor-pointer transition-colors transition-duration-150"
                                routerLink="/account/login">Login</a>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<app-register-confirmation *ngIf="registrationCompleted"></app-register-confirmation>
