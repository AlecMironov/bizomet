<p-toast position="bottom-right"></p-toast>

<div class="card">
    <div class="flex align-items-center justify-content-between">
        <h5 class="mb-3 ml-1">My Portfolio</h5>
    </div>
    <p-toolbar styleClass="mb-4">
        <ng-template pTemplate="left">
            <button pButton pRipple label="Add Reference" icon="pi pi-plus-circle" class="p-button-secondary"
                (click)="openNew()"></button>
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="portfolioList" [rows]="10" [paginator]="totalRecords > 10" responsiveLayout="stack"
        [lazy]="true" (onLazyLoad)="loadPortfolio($event)" [totalRecords]="totalRecords" [rowHover]="true" dataKey="id"
        [loading]="loading" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
        [showCurrentPageReport]="false">
        <ng-template pTemplate="body" let-portfolio>
            <tr>
                <td>
                    <div class="grid">
                        <div class="col-fixed w-6rem">
                            <button pButton pRipple icon="pi pi-pencil"
                                class="p-button-rounded p-button-text p-button-plain"
                                (click)="editPortfolio(portfolio)"></button>
                            <button pButton pRipple icon="pi pi-trash"
                                class="p-button-rounded p-button-text p-button-plain"
                                (click)="deletePortfolio(portfolio)"></button>
                        </div>
                        <div class="col-10">
                            <div class="grid">
                                <div class="col-12 md:col-6">
                                    <span class="font-medium">{{portfolio.title}}</span>
                                </div>
                                <div class="col-12 md:col-6">
                                    <a class="underline text-700" href="{{portfolio.link}}" rel="noopener"
                                        target="_blank">{{portfolio.link}}</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="portfolioDialog" [style]="{width: '450px'}" header="Portfolio Reference Details" [modal]="true"
    styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field">
            <label for="title">Title<span class="required-dot">&#11044;</span></label>
            <input type="text" pInputText id="title" [(ngModel)]="portfolio.title" required autofocus />
            <small class="p-error" *ngIf="submitted && !portfolio.title">Title is required.</small>
        </div>
        <div class="field">
            <label for="title">Link<span class="required-dot">&#11044;</span></label>
            <input type="text" pInputText id="link" [(ngModel)]="portfolio.link" required autofocus />
            <small class="p-error" *ngIf="submitted && !portfolio.link">Link is required.</small>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
        <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveProduct()"></button>
    </ng-template>
</p-dialog>

<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>
