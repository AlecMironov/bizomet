<div class="grid">
    <div class="col-12 md:col-7 xl:col-5">
        <div class="card px-6 py-5">
            <div class="flex align-items-start flex-column flex-wrap lg:justify-content-between">
                <div class="flex align-items-start flex-column md:flex-row">
                    <div class="profile-img-lg mr-5 mb-3 lg:mb-0" [ngStyle]="{ 'background-image': currentProfile.picture }"></div>
                    <div>
                        <span class="text-900 font-medium text-3xl">{{ currentProfile.firstName }} {{ currentProfile.lastName }}</span>
                        <div class="flex align-items-center flex-wrap text-sm">
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">FOLLOWERS</span>
                                <div class="text-700 mt-2">333</div>
                            </div>
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">PROJECTS</span>
                                <div class="text-700 mt-2">26</div>
                            </div>
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">COLLECTIONS</span>
                                <div class="text-700 mt-2">17</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="py-3">
                    <p-chip class="mr-2" *ngFor="let role of currentProfile.roles">
                        <span class="p-2">{{ role }}</span>
                    </p-chip>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 md:col-5 xl:col-7">
        <div class="card h-16rem">
            <h5>Card 2</h5>
        </div>
    </div>

    <div class="col-12">
        <div class="card h-20rem">
            <h5>Card 1: MY PROFILE</h5>
            <header class="jumbotron">
                <h3>
                    Name: <strong>{{ currentProfile.firstName }} {{ currentProfile.lastName }}</strong>
                </h3>
            </header>
            <p>
                <strong>Email:</strong>
                {{ currentProfile.userEmail }}
            </p>
            <strong>Roles:</strong>
            <ul>
                <li *ngFor="let role of currentProfile.roles">
                    {{ role }}
                </li>
            </ul>
        </div>
    </div>
</div>
