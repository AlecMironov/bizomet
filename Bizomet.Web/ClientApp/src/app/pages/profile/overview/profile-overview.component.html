<div #grd class="grid">
    <div class="col-12 md:col-7 xl:col-5">
        <div class="card px-6 py-5">
            <div class="flex align-items-start flex-column flex-wrap lg:justify-content-between">
                <div class="flex align-items-start flex-column md:flex-row">
                    <div class="profile-img-lg mr-5 mb-3 lg:mb-0"
                        [ngStyle]="{ 'background-image': profile.picture }"></div>
                    <div>
                        <span class="text-900 font-medium text-3xl">{{ profile.firstName }} {{
                            profile.lastName }}</span>
                        <div class="flex align-items-center flex-wrap text-sm">
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">FOLLOWERS</span>
                                <div class="text-700 mt-2">333</div>
                            </div>
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">PROJECTS</span>
                                <div class="text-700 mt-2">26</div>
                            </div>
                            <div class="mr-5 mt-3">
                                <span class="font-medium text-500">COLLECTIONS</span>
                                <div class="text-700 mt-2">17</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="py-3">
                    <p-chip class="mr-2" *ngFor="let role of profile.rolesInfo">
                        <span class="p-2">{{ role }}</span>
                    </p-chip>
                </div>
            </div>
