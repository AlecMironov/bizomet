<p-blockUI [blocked]="loading"></p-blockUI>
<p-toast position="bottom-right"></p-toast>

<div class="grid">
    <div class="col-12">
        <span class="p-input-icon-right w-full">
            <i class="pi pi-search"></i>
            <input type="text" class="text-lg w-full" pInputText placeholder="Search in my projects">
        </span>
    </div>

    <div class="col-12">
        <p-toolbar>
            <ng-template pTemplate="left">
                <label class="text-300">Filter placeholder</label>
                <!-- <button pButton pRipple label="Add Reference" icon="pi pi-plus-circle" class="p-button-secondary"
                (click)="openNew()"></button> -->
            </ng-template>
        </p-toolbar>
    </div>

    <div class="col-12">
        <p-table #dt [value]="projectList" [rows]="15" [paginator]="totalRecords > 15" responsiveLayout="stack"
            [lazy]="true" (onLazyLoad)="loadData($event)" [totalRecords]="totalRecords" [rowHover]="true" dataKey="id"
            [loading]="loading" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
            [showCurrentPageReport]="false">
            <ng-template pTemplate="body" let-project>
                <tr>
                    <td>
                        <div class="grid">
                            <!-- <div class="col-fixed w-6rem">
                            <button pButton pRipple icon="pi pi-pencil"
                                class="p-button-rounded p-button-text p-button-plain"
                                (click)="editPortfolio(portfolio)"></button>
                            <button pButton pRipple icon="pi pi-trash"
                                class="p-button-rounded p-button-text p-button-plain"
                                (click)="deletePortfolio(portfolio)"></button>
                        </div> -->
                            <div class="col-10">
                                <div class="grid">
                                    <div class="col-12 md:col-6">
                                        <span class="font-medium">{{project.title}}</span>
                                    </div>
                                    <div class="col-12 md:col-6">
                                        <!-- <a class="underline text-700" href="{{project.link}}" rel="noopener"
                                        target="_blank">{{project.link}}</a> -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
