<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Bizomet</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Layout CSS -->
    <link id="theme-css" rel="stylesheet" type="text/css" href="assets/theme/purple/theme-dark.css">
    <link id="layout-css" rel="stylesheet" type="text/css" href="assets/layout/css/purple/layout-dark.css">
    <!-- <link id="theme-link" rel="stylesheet" type="text/css" href="assets/css/themes/lara-light-indigo/theme.css"> -->
    <!-- <link id="theme-link" rel="stylesheet" type="text/css" href="assets/css/themes/soho-dark/theme.css"> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"
        integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body style="overflow-x: hidden;">
    <app-root>
        <div class="loading-wrapper">
            <svg class="loader12" height="57" stroke="#fff" viewBox="0 0 57 57" width="57"
                xmlns="http://www.w3.org/2000/svg">
                <g fill-rule="evenodd" fill="none">
                    <g stroke-width="2" transform="translate(1 1)">
                        <circle class="loader12__path-left" cx="5" cy="50" r="5"></circle>
                        <circle class="loader12__path-top" cx="27" cy="5" r="5"></circle>
                        <circle class="loader12__path-right" cx="50" cy="50" r="5"></circle>
                    </g>
                </g>
            </svg>
        </div>
    </app-root>
</body>

<script>
    const loader12Timeline = new TimelineMax({ repeat: -1 });

    loader12Timeline.to('.loader12__path-top', 0.75, {
        attr: {
            cx: 50,
            cy: 50
        }
    }, "l12_1")
        .to('.loader12__path-left', 0.75, {
            attr: {
                cx: 27,
                cy: 5
            }
        }, "l12_1")
        .to('.loader12__path-right', 0.75, {
            attr: {
                cx: 5,
                cy: 50
            }
        }, "l12_1");
</script>

</html>
